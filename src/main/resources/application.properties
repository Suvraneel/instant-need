spring.application.name=instant-need

# ── Redis (token blacklist) ────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/instant_need}
spring.datasource.username=${DB_USERNAME:${user.name}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT: override JWT_SECRET with a ≥32-byte Base64-encoded secret in production
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS10aGF0LXNob3VsZC1iZS1jaGFuZ2VkLWluLXByb2R1Y3Rpb24=}
app.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=false

# ── Seed data ─────────────────────────────────────────────────────────────────
# Set to true (or export SEED_DATA=true) to auto-create test objects on startup.
# Leave false in production — once seeded, flip back to false.
app.seed-data.enabled=${SEED_DATA:false}

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed origins. Override with CORS_ORIGINS env var in production.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ── Email ─────────────────────────────────────────────────────────────────────
# Set MAIL_ENABLED=true and provide SMTP credentials to enable email sending.
# Leave MAIL_ENABLED=false (default) in development — emails are logged instead.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@instantneed.com}
app.mail.app-url=${APP_URL:http://localhost:3000}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
# Port 587 (Gmail, AWS SES) uses STARTTLS; port 465 (Hostinger) uses implicit SSL.
# Set MAIL_SMTP_SSL=true and MAIL_SMTP_STARTTLS=false together when using port 465.
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS:true}

# ── Firebase / FCM push notifications ────────────────────────────────────────
# Set FCM_ENABLED=true and provide service account credentials in production.
# FIREBASE_SERVICE_ACCOUNT_JSON — full JSON string (preferred for cloud deployments)
# FIREBASE_SERVICE_ACCOUNT_PATH — path to service account .json file (for server deployments)
app.fcm.enabled=${FCM_ENABLED:false}

# ── Image upload / storage ────────────────────────────────────────────────────
# Dev  (default): STORAGE_TYPE=local — files stored at ./uploads, served at /uploads/**
# Prod:           STORAGE_TYPE=s3   — files stored in S3, served via CloudFront
#
# Required prod env vars:
#   STORAGE_TYPE=s3
#   S3_BUCKET=instantneed-products-images
#   AWS_REGION=ap-northeast-2
#   STORAGE_BASE_URL=https://<your-cloudfront-domain>.cloudfront.net
app.storage.type=${STORAGE_TYPE:local}
app.storage.upload-dir=${UPLOAD_DIR:./uploads}
app.storage.base-url=${STORAGE_BASE_URL:http://localhost:8080/uploads}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${AWS_REGION:ap-northeast-2}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ── OpenAPI ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
