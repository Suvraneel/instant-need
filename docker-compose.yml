services:

  # ── Redis (token revocation blacklist) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Database ────────────────────────────────────────────────────────────────
  # Now using AWS RDS (managed PostgreSQL) instead of a local container.
  # DB_URL / DB_USERNAME / DB_PASSWORD are supplied via .env and point at the
  # RDS endpoint. The old local postgres service is kept commented for reference.
  #
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: instant-need-db
  #     POSTGRES_USER: ${DB_USERNAME}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #   ports:
  #     - "127.0.0.1:5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d instant-need-db"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env          # DB_USERNAME, DB_PASSWORD (RDS credentials) live here
    environment:
      # AWS RDS PostgreSQL endpoint (hostname is not secret; auth is via .env + security group)
      DB_URL: jdbc:postgresql://instant-need-db.ckdqgkcuwuyi.us-east-1.rds.amazonaws.com:5432/instant-need-db?sslmode=require
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # Frontend is deployed separately on Vercel — not included here.

volumes:
  uploads_data:
